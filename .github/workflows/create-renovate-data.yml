name: Create Renovate Data

on:
  workflow_dispatch:
  schedule:
    - cron: "5 4 * * *"

permissions:
  contents: read

jobs:

  fetch-extensions:
    permissions:
      contents: write
    runs-on: windows-latest
    outputs:
      extensions-changed: ${{ steps.changed.outputs.extensions-changed }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          ref: main
          sparse-checkout: |
            01-update-extension-cache.ps1
            .cache/extensions.json
          sparse-checkout-cone-mode: false

      - name: Download recent extensions
        id: changed
        run: |
          $before = git rev-parse HEAD
          $env:EXTENSIONS_LIST_ONLY = "true"
          .\01-update-extension-cache.ps1
          $after = git rev-parse HEAD
          $extensionsChanged = ($before -ne $after).ToString().ToLowerInvariant()
          "extensions-changed=$extensionsChanged" >> $env:GITHUB_OUTPUT
          if ($extensionsChanged -eq "true") {
            git push origin HEAD:main
          }
        shell: pwsh

  marketplace:
    needs: fetch-extensions
    if: needs.fetch-extensions.outputs.extensions-changed == 'true'
    permissions:
      contents: write
    concurrency:
      group: create-renovate-data-json-${{ github.ref }}
      cancel-in-progress: false
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          ref: main

      - name: Use node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Update extension cache
        run: |
          npm install npm@latest -g
          $env:USE_CACHE = "false"
          .\01-update-extension-cache.ps1
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
        shell: pwsh

      - name: Generate azure-pipelines-marketplace-tasks.json
        run: |
          .\02-generate-renovate-data-marketplace.ps1
        shell: pwsh

      - name: Push changes
        run: git push origin HEAD:main
        shell: pwsh

  builtin:
    permissions:
      contents: write
    concurrency:
      group: create-renovate-data-json-${{ github.ref }}
      cancel-in-progress: false
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          ref: main
          sparse-checkout: |
            03-generate-renovate-data-builtin.ps1
            azure-pipelines-builtin-tasks-base.json
            azure-pipelines-builtin-tasks.json
          sparse-checkout-cone-mode: false

      - name: Generate azure-pipelines-builtin-tasks.json
        run: |
          .\03-generate-renovate-data-builtin.ps1
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
          AZURE_DEVOPS_ORG: ${{ vars.AZURE_DEVOPS_ORG }}
        shell: pwsh

      - name: Push changes
        run: git push origin HEAD:main
        shell: pwsh
